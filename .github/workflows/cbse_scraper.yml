name: CBSE Official Notice Scraper

on:
  schedule:
    - cron: '0 * * * *' # Har ghante run karega
  workflow_dispatch: # Manual trigger button

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 boto3 firebase-admin google-generativeai

      - name: Create Firebase Credentials File
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          echo "$FIREBASE_CREDENTIALS" > serviceAccountKey.json

      - name: Execute CBSE Scraper Pipeline
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Agar aap apna R2 Public domain add karna chahte hain:
          # R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          python cbse_updater.py
